name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Minimal permissions — fork PRs have no secrets access by design with pull_request trigger
permissions:
  contents: read

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Codecov OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

      # Coverage — run per-package with flags for per-package Codecov badges
      - run: pnpm --filter @codewithagents/api-errors run test:coverage
      - run: pnpm --filter @codewithagents/openapi-gen run test:coverage
      - run: pnpm --filter @codewithagents/openapi-react-query run test:coverage
      - run: pnpm --filter @codewithagents/openapi-server run test:coverage

      - name: Upload coverage to Codecov (api-errors)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./packages/api-errors/coverage/lcov.info
          flags: api-errors
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (openapi-gen)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./packages/openapi-gen/coverage/lcov.info
          flags: openapi-gen
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (openapi-react-query)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./packages/openapi-react-query/coverage/lcov.info
          flags: openapi-react-query
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (openapi-server)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./packages/openapi-server/coverage/lcov.info
          flags: openapi-server
          fail_ci_if_error: false

  examples:
    name: Examples (Generate + Typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Regenerate examples
        run: pnpm --filter @codewithagents/examples run generate
      - name: Verify generated output is up to date
        run: |
          git diff --exit-code examples/generated/ || (echo "Generated output is out of date. Run 'pnpm generate' in examples/ and commit the result." && exit 1)
      - name: Typecheck generated output
        run: pnpm --filter @codewithagents/examples run typecheck

  e2e:
    name: E2E (Petstore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/petstore
      - name: Run E2E tests
        run: pnpm --filter @codewithagents/petstore run test:e2e
