name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Minimal permissions — fork PRs have no secrets access by design with pull_request trigger
permissions:
  contents: read

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Codecov OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

      # Coverage — run per-package with flags for per-package Codecov badges
      - run: pnpm --filter @codewithagents/api-errors run test:coverage
      - run: pnpm --filter @codewithagents/openapi-gen run test:coverage
      - run: pnpm --filter @codewithagents/openapi-react-query run test:coverage
      - run: pnpm --filter @codewithagents/openapi-server run test:coverage

      # Vitest V8 emits paths relative to each package root (e.g. "src/index.ts").
      # Codecov needs repo-relative paths ("packages/api-errors/src/index.ts") to
      # match source files in git. Rewrite SF: lines in each lcov before upload.
      - name: Fix lcov paths for Codecov (monorepo prefix)
        run: |
          for pkg in api-errors openapi-gen openapi-react-query openapi-server; do
            lcov="packages/$pkg/coverage/lcov.info"
            [ -f "$lcov" ] && sed -i "s|^SF:src/|SF:packages/$pkg/src/|g" "$lcov"
          done

      - name: Upload coverage to Codecov (api-errors)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./packages/api-errors/coverage/lcov.info
          flags: api-errors
          disable_search: true   # prevent auto-discovery of other packages' lcov files
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (openapi-gen)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./packages/openapi-gen/coverage/lcov.info
          flags: openapi-gen
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (openapi-react-query)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./packages/openapi-react-query/coverage/lcov.info
          flags: openapi-react-query
          disable_search: true
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (openapi-server)
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./packages/openapi-server/coverage/lcov.info
          flags: openapi-server
          disable_search: true
          fail_ci_if_error: false

  e2e:
    name: E2E (Petstore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/petstore
      - name: Run E2E tests
        run: pnpm --filter @codewithagents/petstore run test:e2e
