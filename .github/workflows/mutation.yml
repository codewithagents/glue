name: Mutation Testing

# Mutation runs are slow, so they do not gate every PR. They run weekly and on
# demand, and enforce each package's Stryker `thresholds.break` (a score below
# break fails the job). This is the real "mutation testing across all four
# packages" gate.
on:
  schedule:
    - cron: '0 5 * * 1' # Weekly Monday 5am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    name: Mutation (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - openapi-gen
          - openapi-react-query
          - openapi-server
          - api-errors
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Mutation test (enforces thresholds.break)
        run: pnpm --filter @codewithagents/${{ matrix.package }} run test:mutation
