name: Fallow (Code Quality)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # required for inline review comments

jobs:
  fallow:
    name: Code Intelligence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # full history needed for audit base comparison
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # TODO: pin to a specific commit SHA once fallow-rs/fallow@v2 publishes a stable ref
      - uses: fallow-rs/fallow@v2
        with:
          command: audit
          comment: true           # sticky PR summary comment
          review-comments: true   # inline suggestions on changed lines
          annotations: true       # diff annotations in the Files tab
          fail-on-issues: false   # advisory only — never blocks merge
