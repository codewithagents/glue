name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_openapi_gen:
        description: 'Re-publish @codewithagents/openapi-gen (for failed release recovery)'
        type: boolean
        default: false
      publish_api_errors:
        description: 'Re-publish @codewithagents/api-errors (for failed release recovery)'
        type: boolean
        default: false

permissions:
  contents: write       # create tags and releases
  pull-requests: write  # create and update release PRs

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      api-errors--release_created: ${{ steps.release.outputs['packages/api-errors--release_created'] }}
      api-errors--version: ${{ steps.release.outputs['packages/api-errors--version'] }}
      openapi-gen--release_created: ${{ steps.release.outputs['packages/openapi-gen--release_created'] }}
      openapi-gen--version: ${{ steps.release.outputs['packages/openapi-gen--version'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-api-errors:
    name: Publish @codewithagents/api-errors
    needs: release-please
    if: ${{ needs.release-please.outputs['api-errors--release_created'] || inputs.publish_api_errors }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # setup-node injects NODE_AUTH_TOKEN=$GITHUB_TOKEN into .npmrc, which blocks
      # OIDC Trusted Publishing. Remove it so npm falls back to OIDC token exchange.
      - name: Remove injected auth token (npm will use OIDC Trusted Publishing)
        run: npm config delete //registry.npmjs.org/:_authToken
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Use `npm publish` (not pnpm) — only npm CLI implements the OIDC
      # Trusted Publisher token exchange required for tokenless publishing.
      - run: npm publish --access public
        working-directory: packages/api-errors

  publish-openapi-gen:
    name: Publish @codewithagents/openapi-gen
    needs: release-please
    if: ${{ needs.release-please.outputs['openapi-gen--release_created'] || inputs.publish_openapi_gen }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # setup-node injects NODE_AUTH_TOKEN=$GITHUB_TOKEN into .npmrc, which blocks
      # OIDC Trusted Publishing. Remove it so npm falls back to OIDC token exchange.
      - name: Remove injected auth token (npm will use OIDC Trusted Publishing)
        run: npm config delete //registry.npmjs.org/:_authToken
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @codewithagents/openapi-gen build
      # Use `npm publish` (not pnpm) — only npm CLI implements the OIDC
      # Trusted Publisher token exchange required for tokenless publishing.
      - run: npm publish --access public
        working-directory: packages/openapi-gen
