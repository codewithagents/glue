name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write       # create tags and releases
  pull-requests: write  # create and update release PRs

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      api-errors--release_created: ${{ steps.release.outputs['packages/api-errors--release_created'] }}
      api-errors--version: ${{ steps.release.outputs['packages/api-errors--version'] }}
      openapi-gen--release_created: ${{ steps.release.outputs['packages/openapi-gen--release_created'] }}
      openapi-gen--version: ${{ steps.release.outputs['packages/openapi-gen--version'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-api-errors:
    name: Publish @codewithagents/api-errors
    needs: release-please
    if: ${{ needs.release-please.outputs['api-errors--release_created'] }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @codewithagents/api-errors publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-openapi-gen:
    name: Publish @codewithagents/openapi-gen
    needs: release-please
    if: ${{ needs.release-please.outputs['openapi-gen--release_created'] }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @codewithagents/openapi-gen build
      - run: pnpm --filter @codewithagents/openapi-gen publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
