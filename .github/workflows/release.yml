name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # changesets needs to commit version bumps
  pull-requests: write  # changesets needs to open "Version Packages" PRs
  id-token: write       # required for npm provenance attestation

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # TODO: migrate to npm Trusted Publishing (OIDC) after v0.1.0 is live —
      # that removes the need for NPM_TOKEN entirely. See:
      # https://docs.npmjs.com/generating-provenance-statements#using-third-party-registries
      - uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
