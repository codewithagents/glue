openapi: "3.1.0"
info:
  title: Simple API
  version: "1.0.0"
paths:
  /items:
    get:
      operationId: listItems
      summary: List items
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
            enum: ["books", "electronics", "clothing"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
  /items/{id}:
    get:
      operationId: getItem
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
    delete:
      operationId: deleteItem
      summary: Delete item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No content
components:
  schemas:
    Item:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          enum: ["books", "electronics", "clothing"]
        price:
          type: number
